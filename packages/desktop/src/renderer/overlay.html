<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>OpenMuncher</title>
<style>
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-user-select: none;
    user-select: none;
  }
  #stage {
    position: relative;
    width: 240px; height: 240px;
    cursor: pointer;
    -webkit-app-region: drag;
  }
  /* The big circle is the click target. The drag region above is overridden
     for the inner circle so clicks register instead of starting a window drag. */
  #disc {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 200px; height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(40,40,40,0.92), rgba(20,20,20,0.85));
    box-shadow: 0 12px 40px rgba(0,0,0,0.55), inset 0 0 0 2px rgba(255,255,255,0.1);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    -webkit-app-region: no-drag; /* clicks register, not drags */
    transition: transform 120ms cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 120ms;
  }
  #disc:hover {
    transform: translate(-50%, -50%) scale(1.04);
    box-shadow: 0 16px 50px rgba(0,0,0,0.7), inset 0 0 0 2px rgba(255,255,255,0.18);
  }
  #disc:active {
    transform: translate(-50%, -50%) scale(0.96);
  }
  #mascot {
    font-size: 96px;
    line-height: 1;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
    pointer-events: none;
  }
  #mascot.chomp {
    animation: chomp 380ms cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes chomp {
    0%   { transform: scale(1)    rotate(0deg); }
    25%  { transform: scale(1.4)  rotate(-12deg); }
    50%  { transform: scale(0.85) rotate(8deg); }
    75%  { transform: scale(1.2)  rotate(-6deg); }
    100% { transform: scale(1)    rotate(0deg); }
  }
  #label {
    margin-top: 6px;
    color: #fff;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    opacity: 0.85;
    pointer-events: none;
  }
  #hint {
    position: absolute;
    bottom: 8px; left: 0; right: 0;
    text-align: center;
    color: rgba(255,255,255,0.55);
    font-size: 10px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    pointer-events: none;
  }
  .splat {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-size: 56px;
    pointer-events: none;
    opacity: 0;
  }
  .splat.fire {
    animation: splat 600ms ease-out forwards;
  }
  @keyframes splat {
    0%   { transform: translate(-50%, -50%) scale(0)   rotate(0deg);   opacity: 1; }
    50%  { transform: translate(-50%, -50%) scale(1.5) rotate(-15deg); opacity: 1; }
    100% { transform: translate(-130%, -180%) scale(0.6) rotate(45deg); opacity: 0; }
  }
  #closebtn {
    position: absolute;
    top: 8px; right: 8px;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: rgba(0,0,0,0.55);
    color: #fff;
    font-size: 14px;
    line-height: 22px;
    text-align: center;
    cursor: pointer;
    -webkit-app-region: no-drag;
    z-index: 10;
  }
  #closebtn:hover { background: rgba(220, 50, 50, 0.85); }
  #counter {
    position: absolute;
    top: 8px; left: 8px;
    color: rgba(255,255,255,0.6);
    font-size: 11px;
    font-variant-numeric: tabular-nums;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    -webkit-app-region: no-drag;
    pointer-events: none;
  }
</style>
</head>
<body>
  <div id="stage">
    <span id="counter">0</span>
    <span id="closebtn">×</span>
    <div id="disc">
      <span id="mascot">🪵</span>
      <span id="label">Click to munch</span>
      <span id="splat" class="splat">💥</span>
    </div>
    <div id="hint">drag corners to move · × to close</div>
  </div>
<script>
  const MASCOTS = [
    { name: 'Woodchipper', emoji: '🪵', splat: '🪚' },
    { name: 'Beaver',      emoji: '🦫', splat: '🪵' },
    { name: 'Furnace',     emoji: '🔥', splat: '💨' },
    { name: 'Compactor',   emoji: '🗑️', splat: '💥' },
    { name: 'Lumberjack',  emoji: '🪓', splat: '🌲' },
    { name: 'Goat',        emoji: '🐐', splat: '📜' },
    { name: 'Shark',       emoji: '🦈', splat: '🩸' },
  ];

  let idx = 0;
  let count = 0;
  const mascotEl = document.getElementById('mascot');
  const labelEl = document.getElementById('label');
  const splatEl = document.getElementById('splat');
  const closeBtn = document.getElementById('closebtn');
  const counterEl = document.getElementById('counter');
  const discEl = document.getElementById('disc');

  function setMascot(i) {
    idx = i % MASCOTS.length;
    const m = MASCOTS[idx];
    mascotEl.textContent = m.emoji;
    splatEl.textContent = m.splat;
    labelEl.textContent = m.name;
  }

  function chomp() {
    const m = MASCOTS[idx];
    mascotEl.classList.remove('chomp');
    splatEl.classList.remove('fire');
    void mascotEl.offsetWidth; // force reflow
    mascotEl.classList.add('chomp');
    splatEl.classList.add('fire');
    window.openmuncher.munch(m.name);
    count++;
    counterEl.textContent = count;
    // Cycle to the next mascot after the chomp animation lands.
    setTimeout(() => setMascot(idx + 1), 420);
  }

  discEl.addEventListener('click', chomp);
  closeBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    window.openmuncher.dismiss();
  });

  // Pick a random starting mascot.
  setMascot(Math.floor(Math.random() * MASCOTS.length));
</script>
</body>
</html>
