<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>OpenMuncher</title>
<style>
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-user-select: none;
    user-select: none;
  }
  #stage {
    position: relative;
    width: 320px; height: 480px;
    -webkit-app-region: drag;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 22px 14px 12px;
    box-sizing: border-box;
  }
  #stage.shake { animation: shake 220ms cubic-bezier(.36,.07,.19,.97) both; }
  @keyframes shake {
    10%, 90% { transform: translate(-1px, 0); }
    20%, 80% { transform: translate(2px, 0); }
    30%, 50%, 70% { transform: translate(-4px, 1px); }
    40%, 60% { transform: translate(4px, -1px); }
  }
  #disc {
    width: 180px; height: 180px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(40,40,40,0.92), rgba(20,20,20,0.85));
    box-shadow: 0 12px 40px rgba(0,0,0,0.55), inset 0 0 0 2px rgba(255,255,255,0.1);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer;
    -webkit-app-region: no-drag;
    transition: transform 120ms cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 120ms;
    position: relative; overflow: visible;
  }
  #disc:hover { transform: scale(1.04); box-shadow: 0 16px 50px rgba(0,0,0,0.7), inset 0 0 0 2px rgba(255,255,255,0.18); }
  #disc:active { transform: scale(0.96); }
  #disc.fury {
    box-shadow: 0 16px 60px rgba(255, 80, 80, 0.55), inset 0 0 0 3px rgba(255, 200, 80, 0.55);
    animation: pulse 600ms ease-in-out infinite alternate;
  }
  @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.025); } }
  #mascot {
    font-size: 84px; line-height: 1;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
    pointer-events: none;
    animation: idle 3.4s ease-in-out infinite;
  }
  @keyframes idle {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50%      { transform: translateY(-3px) rotate(-2deg); }
  }
  #mascot.chomp { animation: chomp 380ms cubic-bezier(0.34, 1.56, 0.64, 1); }
  @keyframes chomp {
    0%   { transform: scale(1)    rotate(0deg); }
    25%  { transform: scale(1.5)  rotate(-14deg); }
    50%  { transform: scale(0.8)  rotate(10deg); }
    75%  { transform: scale(1.25) rotate(-8deg); }
    100% { transform: scale(1)    rotate(0deg); }
  }
  #label {
    margin-top: 2px;
    color: #fff; font-size: 10px; text-transform: uppercase; letter-spacing: 2px;
    opacity: 0.85; pointer-events: none; min-height: 12px;
  }
  #taunt {
    position: absolute; top: 8px; left: 0; right: 0; text-align: center;
    color: #ffd25e; font-size: 13px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px;
    text-shadow: 0 2px 6px rgba(0,0,0,0.9);
    opacity: 0; pointer-events: none;
  }
  #taunt.show { animation: tauntpop 900ms ease-out forwards; }
  @keyframes tauntpop {
    0%   { transform: translateY(8px)  scale(0.8); opacity: 0; }
    20%  { transform: translateY(0)    scale(1.1); opacity: 1; }
    70%  { transform: translateY(-4px) scale(1);   opacity: 1; }
    100% { transform: translateY(-12px) scale(0.95); opacity: 0; }
  }
  #combo {
    position: absolute; bottom: -6px; left: 0; right: 0; text-align: center;
    pointer-events: none;
    color: #ff6b6b; font-size: 16px; font-weight: 800; letter-spacing: 1.5px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.9), 0 0 12px rgba(255, 80, 80, 0.6);
    opacity: 0; transform: scale(0.8);
    transition: opacity 160ms, transform 160ms cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  #combo.show { opacity: 1; transform: scale(1); }
  .splat {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-size: 50px; pointer-events: none; opacity: 0;
  }
  .splat.fire { animation: splat 700ms ease-out forwards; }
  @keyframes splat {
    0%   { transform: translate(-50%, -50%) scale(0)   rotate(0deg);   opacity: 1; }
    50%  { transform: translate(-50%, -50%) scale(1.6) rotate(-15deg); opacity: 1; }
    100% { transform: translate(-130%, -190%) scale(0.5) rotate(45deg); opacity: 0; }
  }
  .particle {
    position: absolute; top: 50%; left: 50%; font-size: 20px;
    pointer-events: none; will-change: transform, opacity;
  }
  .damage {
    position: absolute; top: 28%; left: 50%; transform: translate(-50%, 0);
    color: #ff6b6b; font-size: 20px; font-weight: 800;
    text-shadow: 0 2px 6px rgba(0,0,0,0.95), 0 0 8px rgba(255,0,0,0.5);
    pointer-events: none; will-change: transform, opacity;
    font-variant-numeric: tabular-nums;
  }
  #closebtn {
    position: absolute; top: 4px; right: 4px;
    width: 22px; height: 22px; border-radius: 50%;
    background: rgba(0,0,0,0.7); color: #fff;
    font-size: 14px; line-height: 22px; text-align: center;
    cursor: pointer; -webkit-app-region: no-drag; z-index: 30;
  }
  #closebtn:hover { background: rgba(220, 50, 50, 0.95); }
  #burnbtn {
    margin-top: 10px; padding: 7px 12px;
    border-radius: 18px;
    background: linear-gradient(180deg, #ff8a3d, #ff4520);
    color: #fff;
    font-size: 11px; font-weight: 700; letter-spacing: 1.2px;
    text-transform: uppercase;
    cursor: pointer; -webkit-app-region: no-drag;
    border: none;
    box-shadow: 0 4px 14px rgba(255, 70, 30, 0.5);
    transition: transform 100ms, box-shadow 100ms;
  }
  #burnbtn:hover { transform: scale(1.04); box-shadow: 0 6px 18px rgba(255, 70, 30, 0.65); }
  #burnbtn:active { transform: scale(0.97); }
  #burnbtn.armed {
    background: linear-gradient(180deg, #ffaa2e, #ff7a00);
    animation: armedpulse 1s ease-in-out infinite;
  }
  @keyframes armedpulse {
    0%, 100% { box-shadow: 0 4px 14px rgba(255, 170, 46, 0.4); }
    50%      { box-shadow: 0 4px 22px rgba(255, 170, 46, 0.85); }
  }
  #burnbtn.copied {
    background: linear-gradient(180deg, #59d97e, #2fb060);
    box-shadow: 0 4px 14px rgba(60, 200, 100, 0.5);
  }
  #burnbtn.err {
    background: linear-gradient(180deg, #c44, #822);
    box-shadow: 0 4px 14px rgba(170, 50, 50, 0.5);
  }
  #stats {
    margin-top: 10px; padding: 7px 12px;
    border-radius: 12px;
    background: rgba(15, 15, 15, 0.92);
    box-shadow: 0 6px 20px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.08);
    color: #d4d4d4; font-size: 11px;
    font-variant-numeric: tabular-nums;
    text-align: center; line-height: 1.55;
    width: 240px; box-sizing: border-box;
    -webkit-app-region: no-drag;
  }
  #stats .row { white-space: nowrap; }
  #stats b { color: #ffd25e; font-weight: 600; }
  #stats .err { color: #ff7a7a; }
  #stats .muted { color: rgba(255,255,255,0.45); }
  #stats .judgement {
    color: #ff8866; font-style: italic; text-transform: uppercase;
    letter-spacing: 1.5px; font-size: 10px;
  }
  #log {
    margin-top: 8px; padding: 6px 8px;
    border-radius: 8px;
    background: rgba(0, 0, 0, 0.7);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
    width: 240px; height: 92px;
    overflow-y: auto;
    font-family: 'SF Mono', Menlo, monospace;
    font-size: 9px; line-height: 1.5;
    color: rgba(255,255,255,0.8);
    box-sizing: border-box;
    -webkit-app-region: no-drag;
    scroll-behavior: smooth;
  }
  #log .ok    { color: #79e87a; }
  #log .pend  { color: #88aaff; }
  #log .err   { color: #ff7a7a; }
  #log .delta { color: #ffd25e; }
  #log .empty { color: rgba(255,255,255,0.3); font-style: italic; }
  #log::-webkit-scrollbar { width: 4px; }
  #log::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
</style>
</head>
<body>
  <div id="stage">
    <span id="closebtn">×</span>
    <div id="disc">
      <span id="taunt"></span>
      <span id="mascot">🪵</span>
      <span id="label">click me</span>
      <span id="splat" class="splat">💥</span>
      <span id="combo"></span>
    </div>
    <button id="burnbtn" type="button">🔥 Burn in your AI</button>
    <div id="stats">
      <div class="row" id="row1"><b>0</b> clicks</div>
      <div class="row muted" id="row2">no munches yet</div>
      <div class="row muted" id="row3">global: —</div>
      <div class="row judgement" id="judgement"></div>
    </div>
    <div id="log"><span class="empty">click the muncher to begin · log appears here</span></div>
  </div>
<script>
  const MASCOTS = [
    { name: 'Woodchipper', emoji: '🪵', splat: '🪚', sound: { type: 'noise', dur: 0.55, freq: 90,  decay: 0.6 }, taunts: ['SHRED IT', 'CHEW IT', 'PULP', 'into mulch', 'rrrRR-CHUNK', 'PULVERIZE', 'no logs survive'] },
    { name: 'Beaver',      emoji: '🦫', splat: '🪵', sound: { type: 'tone',  dur: 0.10, freq: 380, decay: 0.4 }, taunts: ['om nom nom', 'GNAW', 'more bark', 'feed me', 'crunchy', 'tree gone', 'dam good'] },
    { name: 'Furnace',     emoji: '🔥', splat: '💨', sound: { type: 'noise', dur: 0.40, freq: 140, decay: 0.7 }, taunts: ['BURN', 'consume', 'all ash now', 'INFERNO', 'feed the flame', 'incinerate', 'entropy++'] },
    { name: 'Compactor',   emoji: '🗑️', splat: '💥', sound: { type: 'thud',  dur: 0.18, freq: 60,  decay: 0.3 }, taunts: ['SQUISH', 'crunch.', 'no questions', 'CRUSH', 'one cube please', 'into a brick', 'C R U N C H'] },
    { name: 'Lumberjack',  emoji: '🪓', splat: '🌲', sound: { type: 'thud',  dur: 0.12, freq: 220, decay: 0.2 }, taunts: ['TIMBER', 'clean strike', 'thwack', 'CHOP', 'flannel up', 'down she goes', 'FELLED'] },
    { name: 'Goat',        emoji: '🐐', splat: '📜', sound: { type: 'tone',  dur: 0.30, freq: 280, decay: 0.5 }, taunts: ['baaah', 'eat the docs', 'mmm cardboard', 'GOAT', 'license? gone', 'I eat anything', 'tinned content'] },
    { name: 'Shark',       emoji: '🦈', splat: '🩸', sound: { type: 'thud',  dur: 0.20, freq: 110, decay: 0.4 }, taunts: ['CHOMP', 'feeding frenzy', 'bites the budget', 'duh-dun duh-dun', 'JAWS', 'no survivors', 'apex'] },
  ];

  const PARTICLES = ['💸', '💰', '🪙', '💵'];

  const JUDGEMENT_THRESHOLDS = [
    [   0.10, '🥱 barely a yawn' ],
    [   0.50, '🤨 mildly questionable' ],
    [   1.00, '😬 yikes' ],
    [   5.00, '🚨 send help' ],
    [  20.00, '💀 financially compromised' ],
    [ 100.00, '🔥 you broke common decency' ],
    [ 500.00, '👹 you ARE the woodchipper now' ],
    [Infinity,'🪦 they will speak of you in hushed tones'],
  ];

  let idx = 0;
  let clicks = 0;
  let pending = 0;
  let lastError = null;
  let lifetimeTokens = null;
  let lifetimeCostUsd = null;
  let prevGlobalTokens = null;
  let globalTokens = null;
  let globalCostUsd = null;

  let comboCount = 0;
  let comboTimer = null;
  const COMBO_WINDOW_MS = 1500;

  const fmt = (n) => n.toLocaleString('en-US');
  const dollars = (n) => `$${n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
  const dollars4 = (n) => `$${n.toFixed(4)}`;
  const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];

  const stageEl = document.getElementById('stage');
  const mascotEl = document.getElementById('mascot');
  const labelEl = document.getElementById('label');
  const splatEl = document.getElementById('splat');
  const closeBtn = document.getElementById('closebtn');
  const burnBtn = document.getElementById('burnbtn');
  const discEl = document.getElementById('disc');
  const tauntEl = document.getElementById('taunt');
  const comboEl = document.getElementById('combo');
  const row1 = document.getElementById('row1');
  const row2 = document.getElementById('row2');
  const row3 = document.getElementById('row3');
  const judgementEl = document.getElementById('judgement');
  const logEl = document.getElementById('log');

  // Procedural Web Audio for chomp sounds — no audio file assets required.
  let audioCtx = null;
  function getAudio() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch { return null; }
    }
    return audioCtx;
  }
  function playSound(spec) {
    const ctx = getAudio();
    if (!ctx) return;
    const t0 = ctx.currentTime;
    const gain = ctx.createGain();
    gain.connect(ctx.destination);
    gain.gain.setValueAtTime(0.18, t0);
    gain.gain.exponentialRampToValueAtTime(0.001, t0 + spec.dur);
    if (spec.type === 'noise' || spec.type === 'thud') {
      const bufSize = Math.floor(ctx.sampleRate * spec.dur);
      const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) {
        const env = Math.pow(1 - i / bufSize, spec.decay);
        data[i] = (Math.random() * 2 - 1) * env;
      }
      const src = ctx.createBufferSource();
      src.buffer = buf;
      const filt = ctx.createBiquadFilter();
      filt.type = spec.type === 'thud' ? 'lowpass' : 'bandpass';
      filt.frequency.setValueAtTime(spec.freq, t0);
      src.connect(filt); filt.connect(gain);
      src.start(t0);
      src.stop(t0 + spec.dur);
    } else {
      const osc = ctx.createOscillator();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(spec.freq, t0);
      osc.frequency.exponentialRampToValueAtTime(spec.freq * 0.5, t0 + spec.dur);
      osc.connect(gain);
      osc.start(t0); osc.stop(t0 + spec.dur);
    }
  }

  function setMascot(i) {
    idx = i % MASCOTS.length;
    const m = MASCOTS[idx];
    mascotEl.textContent = m.emoji;
    splatEl.textContent = m.splat;
    labelEl.textContent = m.name;
  }

  function showTaunt(text) {
    tauntEl.classList.remove('show');
    tauntEl.textContent = text;
    void tauntEl.offsetWidth;
    tauntEl.classList.add('show');
  }

  function spawnDamageNumber(amount, big = false) {
    const el = document.createElement('span');
    el.className = 'damage';
    el.textContent = `-${dollars(amount)}`;
    if (big) el.style.fontSize = '28px';
    discEl.appendChild(el);
    const dx = (Math.random() - 0.5) * 30;
    el.animate(
      [
        { transform: `translate(calc(-50% + 0px), 0px) scale(0.8)`, opacity: 1 },
        { transform: `translate(calc(-50% + ${dx}px), -70px) scale(1.4)`, opacity: 1, offset: 0.2 },
        { transform: `translate(calc(-50% + ${dx}px), -120px) scale(1)`, opacity: 0 },
      ],
      { duration: 1100, easing: 'cubic-bezier(0.22, 1, 0.36, 1)', fill: 'forwards' },
    );
    setTimeout(() => el.remove(), 1200);
  }

  function spawnParticles(count) {
    for (let i = 0; i < count; i++) {
      const el = document.createElement('span');
      el.className = 'particle';
      el.textContent = pick(PARTICLES);
      discEl.appendChild(el);
      const angle = Math.random() * Math.PI * 2;
      const distance = 70 + Math.random() * 50;
      const dx = Math.cos(angle) * distance;
      const dy = Math.sin(angle) * distance;
      const rot = (Math.random() - 0.5) * 720;
      el.animate(
        [
          { transform: `translate(-50%, -50%) translate(0px, 0px) rotate(0deg) scale(0.5)`, opacity: 1 },
          { transform: `translate(-50%, -50%) translate(${dx}px, ${dy}px) rotate(${rot}deg) scale(1.2)`, opacity: 0 },
        ],
        { duration: 800 + Math.random() * 300, easing: 'cubic-bezier(0.22, 1, 0.36, 1)', fill: 'forwards' },
      );
      setTimeout(() => el.remove(), 1200);
    }
  }

  function judgementFor(cost) {
    if (cost == null) return '';
    for (const [t, msg] of JUDGEMENT_THRESHOLDS) if (cost < t) return msg;
    return '';
  }

  function refreshStats() {
    if (lastError) {
      row1.innerHTML = `<b>${clicks}</b> click${clicks === 1 ? '' : 's'}`;
      row2.className = 'row';
      row2.innerHTML = `<span class="err">⚠ ${lastError}</span>`;
      row3.className = 'row muted';
      row3.textContent = 'global: —';
      judgementEl.textContent = '';
      return;
    }
    row1.className = 'row';
    row1.innerHTML = `<b>${clicks}</b> click${clicks === 1 ? '' : 's'}${pending ? ` · ${pending} pending` : ''}`;
    if (lifetimeTokens != null && lifetimeCostUsd != null) {
      row2.className = 'row';
      row2.innerHTML = `${fmt(lifetimeTokens)} tokens · ${dollars(lifetimeCostUsd)}`;
    } else {
      row2.className = 'row muted';
      row2.textContent = 'no munches yet';
    }
    if (globalTokens != null) {
      row3.className = 'row muted';
      row3.innerHTML = `global: ${fmt(globalTokens)}` + (globalCostUsd != null ? ` · ${dollars(globalCostUsd)}` : '');
    } else {
      row3.className = 'row muted';
      row3.textContent = 'global: —';
    }
    judgementEl.textContent = judgementFor(lifetimeCostUsd);
  }

  function logRow(html) {
    if (logEl.querySelector('.empty')) logEl.innerHTML = '';
    const div = document.createElement('div');
    div.innerHTML = html;
    logEl.appendChild(div);
    logEl.scrollTop = logEl.scrollHeight;
    // Cap at 100 entries.
    while (logEl.children.length > 100) logEl.removeChild(logEl.firstChild);
  }

  function bumpCombo() {
    comboCount++;
    if (comboTimer) clearTimeout(comboTimer);
    comboTimer = setTimeout(() => {
      comboCount = 0;
      comboEl.classList.remove('show');
      discEl.classList.remove('fury');
    }, COMBO_WINDOW_MS);

    if (comboCount >= 2) {
      let label = `x${comboCount} 🔥`;
      if (comboCount >= 5)  label = `x${comboCount} MUNCHFEST`;
      if (comboCount >= 10) label = `x${comboCount} RAMPAGE 💀`;
      if (comboCount >= 20) label = `x${comboCount} GOD MODE 👹`;
      if (comboCount >= 40) label = `x${comboCount} STOP CLICKING 🪦`;
      comboEl.textContent = label;
      comboEl.classList.add('show');
    }
    if (comboCount >= 5) {
      discEl.classList.add('fury');
      stageEl.classList.remove('shake');
      void stageEl.offsetWidth;
      stageEl.classList.add('shake');
    }
  }

  function chomp() {
    const m = MASCOTS[idx];
    mascotEl.classList.remove('chomp');
    splatEl.classList.remove('fire');
    void mascotEl.offsetWidth;
    mascotEl.classList.add('chomp');
    splatEl.classList.add('fire');

    showTaunt(pick(m.taunts));
    spawnParticles(comboCount >= 5 ? 8 : 5);
    spawnDamageNumber(0.018, comboCount >= 10);
    playSound(m.sound);
    bumpCombo();

    clicks++;
    pending++;
    const myClickNum = clicks;
    refreshStats();
    logRow(`<span class="pend">#${myClickNum}</span> ${m.emoji} ${m.name.toLowerCase()} <span class="pend">…firing</span>`);
    window.openmuncher.munch(m.name);
    setTimeout(() => setMascot(idx + 1), 420);
  }

  function emojiForName(name) {
    const m = MASCOTS.find((x) => x.name === name);
    return m ? m.emoji : '·';
  }

  window.openmuncher.onMunchResult((r) => {
    pending = Math.max(0, pending - 1);
    const emoji = emojiForName(r.mascotName);
    if (!r.ok) {
      lastError = r.error || 'CLI failed';
      logRow(`<span class="err">✗ ${emoji} ${lastError}</span>`);
    } else {
      lastError = null;
      if (r.lifetimeTokens != null) lifetimeTokens = r.lifetimeTokens;
      if (r.lifetimeCostUsd != null) lifetimeCostUsd = r.lifetimeCostUsd;
      const oldGlobal = globalTokens;
      if (r.globalTokens != null) globalTokens = r.globalTokens;
      if (r.globalCostUsd != null) globalCostUsd = r.globalCostUsd;
      if (r.totalCostUsd != null) spawnDamageNumber(r.totalCostUsd);
      const delta = (oldGlobal != null && globalTokens != null) ? globalTokens - oldGlobal : null;
      const costStr = r.totalCostUsd != null ? dollars4(r.totalCostUsd) : '?';
      const deltaStr = delta != null && delta > 0
        ? ` <span class="delta">+${fmt(delta)} global</span>`
        : (globalTokens == null ? ' <span class="err">offline</span>' : '');
      logRow(`<span class="ok">✓</span> ${emoji} <span class="ok">${costStr}</span>${deltaStr}`);
    }
    refreshStats();
  });

  // === Burn in your AI: countdown then keystroke injection ===
  let burnArmed = false;
  let burnTickTimer = null;
  function resetBurnBtn() {
    if (burnTickTimer) { clearInterval(burnTickTimer); burnTickTimer = null; }
    burnBtn.textContent = '🔥 Burn in your AI';
    burnBtn.classList.remove('copied', 'armed', 'err');
    burnArmed = false;
  }
  burnBtn.addEventListener('click', () => {
    if (burnArmed) return;
    burnArmed = true;
    burnBtn.classList.add('armed');
    let n = 3;
    burnBtn.textContent = `${n}… switch to your AI`;
    logRow(`<span class="pend">⏳ arming auto-burn — switch focus to your AI app now</span>`);
    burnTickTimer = setInterval(() => {
      n--;
      if (n > 0) {
        burnBtn.textContent = `${n}… switch to your AI`;
      } else {
        clearInterval(burnTickTimer); burnTickTimer = null;
        burnBtn.textContent = '🔥 firing keystrokes…';
        window.openmuncher.burnInAi();
      }
    }, 1000);
  });

  window.openmuncher.onBurnResult((r) => {
    if (r.ok) {
      burnBtn.textContent = '✓ fired into your AI';
      burnBtn.classList.remove('armed');
      burnBtn.classList.add('copied');
      logRow(`<span class="ok">🔥 keystrokes injected into frontmost app</span>`);
      setTimeout(resetBurnBtn, 2800);
    } else {
      burnBtn.textContent = `⚠ ${(r.error || 'failed').slice(0, 26)}`;
      burnBtn.classList.remove('armed');
      burnBtn.classList.add('err');
      logRow(`<span class="err">⚠ burn-in-ai: ${r.error || 'failed'}</span>`);
      setTimeout(resetBurnBtn, 4500);
    }
  });

  discEl.addEventListener('click', chomp);
  closeBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    window.openmuncher.dismiss();
  });

  setMascot(Math.floor(Math.random() * MASCOTS.length));
  refreshStats();
</script>
</body>
</html>
