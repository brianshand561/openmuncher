<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>OpenMuncher</title>
<style>
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-user-select: none;
    user-select: none;
  }
  #stage {
    position: relative;
    width: 240px; height: 240px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #mascot {
    font-size: 96px;
    line-height: 1;
    cursor: pointer;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.35));
    transition: transform 120ms cubic-bezier(0.34, 1.56, 0.64, 1);
    user-select: none;
  }
  #mascot:hover { transform: scale(1.08) rotate(-4deg); }
  #mascot.chomp {
    animation: chomp 380ms cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes chomp {
    0%   { transform: scale(1)    rotate(0deg); }
    25%  { transform: scale(1.35) rotate(-12deg); }
    50%  { transform: scale(0.85) rotate(8deg); }
    75%  { transform: scale(1.2)  rotate(-6deg); }
    100% { transform: scale(1)    rotate(0deg); }
  }
  #label {
    position: absolute;
    bottom: 12px; left: 0; right: 0;
    text-align: center;
    color: #fff;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    text-shadow: 0 2px 6px rgba(0,0,0,0.7);
    opacity: 0.85;
    pointer-events: none;
  }
  .splat {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-size: 48px;
    pointer-events: none;
    opacity: 0;
  }
  .splat.fire {
    animation: splat 600ms ease-out forwards;
  }
  @keyframes splat {
    0%   { transform: translate(-50%, -50%) scale(0)   rotate(0deg);   opacity: 1; }
    50%  { transform: translate(-50%, -50%) scale(1.4) rotate(-15deg); opacity: 1; }
    100% { transform: translate(-130%, -180%) scale(0.5) rotate(45deg); opacity: 0; }
  }
  #closebtn {
    position: absolute;
    top: 6px; right: 6px;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: rgba(0,0,0,0.4);
    color: #fff;
    font-size: 12px;
    line-height: 20px;
    text-align: center;
    cursor: pointer;
    opacity: 0;
    transition: opacity 120ms;
  }
  #stage:hover #closebtn { opacity: 1; }
</style>
</head>
<body>
  <div id="stage">
    <span id="mascot">🪵</span>
    <span id="label">Click to munch</span>
    <span id="closebtn">×</span>
    <span id="splat" class="splat">💥</span>
  </div>
<script>
  const MASCOTS = [
    { name: 'Woodchipper', emoji: '🪵', splat: '🪚' },
    { name: 'Beaver',      emoji: '🦫', splat: '🪵' },
    { name: 'Furnace',     emoji: '🔥', splat: '💨' },
    { name: 'Compactor',   emoji: '🗑️', splat: '💥' },
    { name: 'Lumberjack',  emoji: '🪓', splat: '🌲' },
    { name: 'Goat',        emoji: '🐐', splat: '📜' },
    { name: 'Shark',       emoji: '🦈', splat: '🩸' },
  ];

  let idx = 0;
  const mascotEl = document.getElementById('mascot');
  const labelEl = document.getElementById('label');
  const splatEl = document.getElementById('splat');
  const closeBtn = document.getElementById('closebtn');

  function setMascot(i) {
    idx = i % MASCOTS.length;
    const m = MASCOTS[idx];
    mascotEl.textContent = m.emoji;
    splatEl.textContent = m.splat;
    labelEl.textContent = m.name;
  }

  function chomp() {
    const m = MASCOTS[idx];
    mascotEl.classList.remove('chomp');
    splatEl.classList.remove('fire');
    void mascotEl.offsetWidth; // restart animation
    mascotEl.classList.add('chomp');
    splatEl.classList.add('fire');
    window.openmuncher.munch(m.name);
    // After animation, cycle to next mascot.
    setTimeout(() => setMascot(idx + 1), 420);
  }

  mascotEl.addEventListener('click', chomp);
  closeBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    window.openmuncher.dismiss();
  });

  // Pick a random starting mascot on open.
  setMascot(Math.floor(Math.random() * MASCOTS.length));
</script>
</body>
</html>
